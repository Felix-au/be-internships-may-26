services:
  signals:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - API_KEY=${API_KEY:-change-me}
      - PORT=8080
      - DATABASE_URL=./data/signals.db
      - RATE_LIMIT_PER_MIN=${RATE_LIMIT_PER_MIN:-5}
      - DB_FAIL_RATE=${DB_FAIL_RATE:-0}
    volumes:
      - signals-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  signals-data:
